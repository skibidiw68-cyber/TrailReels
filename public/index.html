<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrailReels - Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0d0e12; color: #f1f2f6; padding-bottom: 40px; }
        header { background-color: #161824; padding: 18px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #23263d; position: sticky; top: 0; z-index: 100; }
        header h1 { color: #ff3838; font-size: 24px; font-weight: 900; }
        .status-pill { font-size: 11px; background: #2f3542; padding: 6px 14px; border-radius: 20px; font-weight: 800; color: #a4b0be; text-transform: uppercase; }
        .auth-container { max-width: 420px; margin: 50px auto; padding: 28px; background: #161824; border-radius: 16px; border: 1px solid #23263d; text-align: center; }
        .auth-container h2 { margin-bottom: 6px; color: #fff; font-size: 24px; font-weight: 800; }
        .auth-container p { color: #747d8c; font-size: 13px; margin-bottom: 24px; }
        .auth-container input { width: 100%; padding: 14px; margin: 9px 0; background: #23263d; border: 1px solid #2f3542; color: white; border-radius: 8px; font-size: 14px; outline: none; }
        .auth-btn { background: #ff3838; color: white; border: none; width: 100%; padding: 14px; font-weight: bold; border-radius: 8px; margin-top: 14px; font-size: 15px; cursor: pointer; }
        .toggle-link { color: #00a8ff; font-size: 13px; margin-top: 20px; display: inline-block; cursor: pointer; }
        .main-app { max-width: 500px; margin: 0 auto; padding: 14px; display: none; }
        .user-bar { background: #1c1e2e; padding: 14px 16px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #23263d; }
        .user-bar span { font-size: 13px; color: #a4b0be; }
        .logout-btn { background: #2f3542; color: #f1f2f6; border: none; padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .creator-box { background: #161824; padding: 16px; border-radius: 14px; margin-bottom: 24px; border: 1px solid #23263d; }
        .creator-box textarea { width: 100%; background: #23263d; border: 1px solid #2f3542; border-radius: 8px; padding: 12px; color: white; resize: none; height: 75px; font-size: 14px; outline: none; }
        .type-selector { display: flex; justify-content: space-around; margin-top: 14px; font-size: 13px; color: #a4b0be; }
        .type-selector label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .btn-post { background: #ff3838; color: white; border: none; width: 100%; padding: 14px; font-size: 14px; font-weight: bold; border-radius: 8px; margin-top: 14px; cursor: pointer; }
        .feed-item { background: #161824; border-radius: 14px; padding: 16px; margin-bottom: 18px; border: 1px solid #23263d; }
        .feed-header { display: flex; align-items: center; margin-bottom: 14px; }
        .avatar { width: 42px; height: 42px; background: #ff3838; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; margin-right: 12px; color: white; }
        .user-meta .name { font-weight: 700; font-size: 15px; color: #fff; }
        .feed-caption { font-size: 14.5px; margin-bottom: 14px; line-height: 1.5; color: #f1f2f6; }
        .media-player { background: #000; width: 100%; height: 250px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #a4b0be; font-size: 13px; position: relative; }
        .shorts-player { height: 380px; max-width: 270px; margin: 0 auto; }
        .live-tag { position: absolute; top: 12px; left: 12px; background: #ff3838; color: white; font-size: 10px; font-weight: 900; padding: 3px 9px; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <h1>TrailReels</h1>
        <div class="status-pill" id="globalStatus">Cloud Offline</div>
    </header>

    <div class="auth-container" id="authScreen">
        <h2 id="authTitle">Welcome to TrailReels</h2>
        <p id="authSubtitle">Log in to sync with your Supabase backend</p>
        <input type="email" id="authEmail" placeholder="Email Address">
        <input type="password" id="authPassword" placeholder="Password (6+ characters)">
        <button class="auth-btn" id="authSubmitBtn" onclick="handleAuth()">Sign In</button>
        <div class="toggle-link" id="authToggle" onclick="toggleAuthMode()">Don't have an account? Sign Up</div>
    </div>

    <div class="main-app" id="mainApp">
        <div class="user-bar">
            <span>Logged in: <b id="userEmailLabel">...</b></span>
            <button class="logout-btn" onclick="logOut()">Log Out</button>
        </div>
        <div class="creator-box">
            <textarea id="txtIn" placeholder="What's happening on the trail?"></textarea>
            <div class="type-selector">
                <label><input type="radio" name="mediaType" value="post" checked> 📝 Post</label>
                <label><input type="radio" name="mediaType" value="video"> 🎥 Video</label>
                <label><input type="radio" name="mediaType" value="short"> 📱 Short</label>
                <label><input type="radio" name="mediaType" value="live"> 🔴 Live</label>
            </div>
            <button class="btn-post" onclick="addPost()">Publish</button>
        </div>
        <div id="feedBox"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
